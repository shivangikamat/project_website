<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 970 522" width="970" height="522" role="img" aria-labelledby="title desc">
<title id="title">Welcome to Insulosis floating island</title>
<desc id="desc">A pastel flat-vector floating island city with mountains, skyline, hospital, shops, beach, lighthouse, clouds, hot-air balloon, and sea.</desc>
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#84a2f2"/><stop offset="1" stop-color="#b9dcff"/></linearGradient>
  <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7fb2de"/><stop offset="1" stop-color="#8cbbe3"/></linearGradient>
  <linearGradient id="grass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a9df7a"/><stop offset="1" stop-color="#82d669"/></linearGradient>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.4"/></filter>
  <style>
    .white{fill:#eef6fb}.cloud{fill:#f2f7fb}.shadow{fill:#6f7b83;opacity:.22}.line{stroke:#fff;stroke-width:3;stroke-linecap:round}.thin{stroke:#8099aa;stroke-width:2;fill:none}.window{fill:#d9f5fb}.outline{stroke:#6b8b99;stroke-width:2;stroke-linejoin:round}.tree{fill:#4aa35d}.trunk{fill:#a96a38}.road{fill:#3b3b3b}.sand{fill:#ffd98d}.water{fill:#7fcfe0}.shop{stroke:#73a9b4;stroke-width:2}.text{font-family:Arial,Helvetica,sans-serif;font-weight:700;fill:#f7fbff;filter:url(#soft)}
  </style>
</defs>
<rect width="970" height="522" fill="url(#sky)"/>
<text class="text" x="485" y="126" font-size="30" text-anchor="middle">Welcome to Insulosis</text>
<rect y="407" width="970" height="115" fill="url(#sea)"/>

